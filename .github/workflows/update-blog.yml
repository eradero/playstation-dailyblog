name: Auto-Update PlayStation Blog

on:
  schedule:
    # Ejecutar cada 6 horas (en punto)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias de Python
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install feedparser google-genai requests beautifulsoup4 python-dotenv

    - name: Ejecutar script de IA y Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd backend
        python main.py

    - name: Hacer Commit y Push de los nuevos artículos
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add .
        # Solo hace commit si hay cambios reales
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Nuevas noticias de PlayStation" && git push)
